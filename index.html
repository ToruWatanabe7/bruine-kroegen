<html lang="nl">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1E1208;--bg2:#2C1F0E;--bg3:#3A2810;--border:#4A3520;--gold:#C8961E;--gold-lt:#F5DEB3;--gold-dim:#8B6914;--text:#E8D5A3;--text2:#B09070;--text3:#7A6040;--r:10px}
html,body{height:100%;font-family:'Georgia',serif;background:var(--bg);color:var(--text);overflow:hidden}
header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;flex-shrink:0}
.logo-main{font-size:15px;font-weight:700;color:var(--gold-lt)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.06em;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:6px}
#cnt{font-size:11px;color:var(--text3);font-family:sans-serif}
.hdr-btn{font-size:11px;padding:5px 9px;border-radius:20px;border:0.5px solid var(--gold-dim);background:transparent;color:var(--gold);cursor:pointer;font-family:sans-serif;white-space:nowrap}
.hdr-btn:hover{background:var(--gold-dim);color:var(--gold-lt)}
.lang-btn{font-size:11px;padding:5px 8px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:sans-serif}
.lang-btn.active{background:var(--bg3);color:var(--gold-lt);border-color:var(--gold-dim)}
#wrap{display:flex;flex-direction:column;height:100vh}
#main{display:flex;flex:1;overflow:hidden;position:relative}
#sidebar{width:305px;min-width:305px;display:flex;flex-direction:column;background:var(--bg2);border-right:0.5px solid var(--border);height:100%}
#map{flex:1;z-index:0}
#filters{padding:7px 11px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:0.5px solid var(--border)}
.fb{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:sans-serif;transition:all 0.12s}
.fb[data-f="no-tourists"].active{background:#1E0A2E;color:#C4B5FD;border-color:#5B21B6}
.fb[data-f="historic"].active{background:#2E1E00;color:#FDE047;border-color:#854D0E}
.fb[data-f="jenever"].active{background:#2E1E00;color:#FCD34D;border-color:#8B6914}
.fb[data-f="terrace"].active{background:#0A2010;color:#6EE7B7;border-color:#065F46}
.fb[data-f="night"].active{background:#0A0A1E;color:#A5B4FC;border-color:#4338CA}
.fb[data-f="ajax"].active{background:#6B0000;color:#FCA5A5;border-color:#991B1B}
.fb[data-f="music"].active{background:#1E0A2E;color:#F9A8D4;border-color:#9D174D}
.fb[data-f="loved"].active{background:#3D0A0A;color:#FCA5A5;border-color:#e05555}
.tag.music{background:#1E0A2E;color:#F9A8D4;border:0.5px solid #9D174D}
.tag.loved{background:#3D0A0A;color:#FCA5A5;border:0.5px solid #e05555}
#sb{padding:6px 11px;border-bottom:0.5px solid var(--border)}
#sb input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;color:var(--text);font-family:sans-serif;outline:none}
#sb input:focus{border-color:var(--gold-dim)}
#sb input::placeholder{color:var(--text3)}
#list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ki{padding:10px 13px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;border-left:2px solid transparent}
.ki:hover{background:var(--bg3)}
.ki.sel{background:#3D2910;border-left-color:var(--gold)}
.ki-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.ki-name{font-size:13px;font-weight:700;color:var(--gold-lt)}
.ki-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ki-est{font-size:10px;color:var(--text3);background:var(--bg);padding:2px 5px;border-radius:8px;white-space:nowrap;font-family:sans-serif}
.ki-heart{cursor:pointer;font-size:14px;line-height:1;user-select:none;color:var(--text3)}
.ki-heart.loved{color:#e05555}
.ki-hood{font-size:11px;color:var(--text3);margin-top:2px;font-family:sans-serif}
.ki-vibe{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4;font-family:sans-serif}
.ki-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;padding:2px 6px;border-radius:10px;font-family:sans-serif}
.tag.jenever{background:#2E1E00;color:#FCD34D;border:0.5px solid #8B6914}
.tag.terrace{background:#0A2010;color:#6EE7B7;border:0.5px solid #065F46}
.tag.historic{background:#2E1E00;color:#FDE047;border:0.5px solid #854D0E}
.tag.award{background:#1E0818;color:#F9A8D4;border:0.5px solid #9D174D}
.tag.night{background:#0A0A1E;color:#A5B4FC;border:0.5px solid #4338CA}
.tag.ajax{background:#5C0000;color:#FCA5A5;border:0.5px solid #991B1B}
.tag.no-tourists{background:#1E0A2E;color:#C4B5FD;border:0.5px solid #5B21B6}
.no-res{padding:24px 13px;text-align:center;font-size:12px;color:var(--text3);font-family:sans-serif}
#det{position:absolute;bottom:0;right:0;width:calc(100% - 305px);background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px 14px;transform:translateY(100%);transition:transform 0.2s ease;z-index:1000;max-height:55%;overflow-y:auto}
#det.open{transform:translateY(0)}
#det-x{position:absolute;top:10px;right:13px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;font-family:sans-serif}
#det-x:hover{color:var(--gold-lt)}
#det-name{font-size:16px;font-weight:700;color:var(--gold-lt)}
#det-meta{font-size:11px;color:var(--text3);margin-top:3px;font-family:sans-serif}
#det-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
#det-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.db{background:var(--bg);border-radius:var(--r);padding:8px 11px;border:0.5px solid var(--border)}
.db.wide{grid-column:1/-1}
.dlbl{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;font-family:sans-serif}
.dval{font-size:12px;color:var(--text2);line-height:1.5;font-family:sans-serif}
.fb-btn{width:100%;margin-top:8px;padding:7px;border-radius:var(--r);border:0.5px solid var(--gold-dim);background:transparent;color:var(--gold);cursor:pointer;font-family:sans-serif;font-size:12px;text-align:left}
.fb-btn:hover{background:var(--bg3)}
.fb-form{margin-top:8px;display:none}
.fb-form.open{display:block}
.fb-form input,.fb-form textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:6px 9px;font-size:12px;color:var(--text);font-family:sans-serif;outline:none;margin-bottom:6px;resize:vertical}
.fb-form input:focus,.fb-form textarea:focus{border-color:var(--gold-dim)}
.fb-form textarea{min-height:70px}
.fb-send{width:100%;padding:7px;border-radius:var(--r);border:none;background:var(--gold-dim);color:var(--gold-lt);cursor:pointer;font-family:sans-serif;font-size:12px}
.fb-send:hover{background:var(--gold)}
.fb-ok{font-size:12px;color:#6EE7B7;font-family:sans-serif;margin-top:6px;display:none}
#crawl-modal{display:none;position:fixed;inset:0;background:rgba(10,6,2,0.87);z-index:2000;align-items:center;justify-content:center}
#crawl-modal.open{display:flex}
#cbox{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:18px 20px;max-width:440px;width:90%;max-height:82vh;overflow-y:auto}
#cbox h3{font-size:14px;color:var(--gold-lt);margin-bottom:3px}
#cbox p{font-size:12px;color:var(--text3);font-family:sans-serif;margin-bottom:12px}
#c-hood{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:6px 8px;font-size:12px;color:var(--text);font-family:sans-serif;margin-bottom:11px;outline:none}
.cstop{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px}
.cnum{width:21px;height:21px;border-radius:50%;background:var(--gold-dim);color:var(--gold-lt);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:sans-serif}
.cnum.loved-num{background:#8B1A1A}
.cinfo .cname{font-size:13px;font-weight:700;color:var(--gold-lt)}
.cinfo .cdesc{font-size:11px;color:var(--text2);font-family:sans-serif;margin-top:2px}
.chr{border:none;border-top:0.5px solid var(--border);margin:0 0 11px 31px}
#crawl-close{margin-top:4px;width:100%;padding:7px;border-radius:var(--r);border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:sans-serif;font-size:12px}
.kpin{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:2px solid #1A0E04;font-size:11px;cursor:pointer;transition:transform 0.15s;font-family:sans-serif;line-height:1}
.kpin:hover{transform:scale(1.2)}
.kpin.sel{border-color:var(--gold-lt);transform:scale(1.3)}
@media(max-width:640px){
  html,body{overflow:hidden}
  #wrap{height:100dvh}
  .logo-sub{display:none}
  #cnt{display:none}
  .hdr-btn{font-size:10px;padding:4px 8px}
  #main{flex-direction:column}
  #map{flex:none;height:45dvh;width:100%}
  #sidebar{width:100%;min-width:unset;height:55dvh;border-right:none;border-top:0.5px solid var(--border);flex-direction:column}
  #filters{padding:6px 10px;gap:4px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
  #filters::-webkit-scrollbar{display:none}
  .fb{white-space:nowrap;flex-shrink:0;font-size:11px}
  #sb{padding:5px 10px}
  #det{width:100%;left:0;right:0;max-height:70dvh;border-radius:14px 14px 0 0}
  #det-body{grid-template-columns:1fr}
  .db.wide{grid-column:1}
  .ki{padding:11px 13px}
  .ki-vibe{display:none}
}
</style>
</head>

   vibe:{nl:"Bruine kroeg schuin achter de Dam. Ajax op groot geprojecteerd scherm boven.",en:"Brown café just behind Dam Square. Ajax on large projected screen upstairs."},
   tip:{nl:"Gemengd publiek van locals en toeristen.",en:"Mixed crowd of locals and tourists."},

let lang='nl';
const T={
  nl:{sub:"Amsterdams authentieke bruine cafés",crawlBtn:"Kroegentocht",search:"Zoek op naam of buurt…",
      fHistoric:"Historisch",fJenever:"Jenever",fTerrace:"Terras",fNight:"Nachtcafé",
      fAjax:"Ajax",fMusic:"Muziek",fLocals:"Geen toeristen",fLoved:"♥ Lievelingen",
      hours:"Openingstijden",hood:"Buurt",sun:"Terras in de zon",
      noSun:"Geen zonnig terras",noTerrace:"Geen terras",
      noRes:"Geen kroegen gevonden — pas filters aan",
      crawlTitle:"Plan een kroegentocht",crawlDesc:"Kies een buurt en we stippelen de perfecte avond voor je uit.",
      crawlFavTitle:"Kroegentocht langs lievelingen",crawlFavDesc:"Een avond langs jouw geliefde kroegen.",
      crawlFavBtn:"♥ Kroegentocht lievelingen",crawlNoFav:"Hart eerst een paar kroegen om een lievelingstocht te plannen.",
      crawlClose:"Sluiten",crawlAll:"Alle buurten",
      times:["Eerste stop — 17:00","Tweede stop — 18:30","Derde stop — 20:00","Slotkroeg — 21:30"],
      award:"Parool beste kroeg 2023",
      feedbackBtn:"💬 Tip of correctie sturen",feedbackName:"Jouw naam",feedbackMsg:"Jouw bericht",feedbackSend:"Versturen",feedbackOk:"Bedankt! We nemen je tip mee.",
      lovedTag:"♥ Lieveling"},
  en:{sub:"Amsterdam's authentic brown cafés",crawlBtn:"Bar crawl",search:"Search by name or neighbourhood…",
      fHistoric:"Historic",fJenever:"Jenever",fTerrace:"Terrace",fNight:"Night café",
      fAjax:"Ajax",fMusic:"Music",fLocals:"Locals only",fLoved:"♥ Favourites",
      hours:"Opening hours",hood:"Neighbourhood",sun:"Sunny terrace",
      noSun:"No sunny terrace",noTerrace:"No terrace",
      noRes:"No kroegen found — adjust filters",
      crawlTitle:"Plan a bar crawl",crawlDesc:"Pick a neighbourhood and we'll build the perfect evening route.",
      crawlFavTitle:"Favourites bar crawl",crawlFavDesc:"An evening through your hearted cafés.",
      crawlFavBtn:"♥ Favourites crawl",crawlNoFav:"Heart a few cafés first to plan a favourites crawl.",
      crawlClose:"Close",crawlAll:"All neighbourhoods",
      times:["First stop — 5pm","Second stop — 6:30pm","Third stop — 8pm","Final stop — 9:30pm"],
      award:"Parool best kroeg 2023",
      feedbackBtn:"💬 Send a tip or correction",feedbackName:"Your name",feedbackMsg:"Your message",feedbackSend:"Send",feedbackOk:"Thanks! We'll take your tip on board.",
      lovedTag:"♥ Favourite"},
};

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  applyLang();renderList();
  if(selId)showDet(K.find(k=>k.id===selId));
}
function applyLang(){
  const t=T[lang];
  document.getElementById('hdr-sub').textContent=t.sub;
  document.getElementById('crawl-btn').textContent=t.crawlBtn;
  document.getElementById('search').placeholder=t.search;
  document.getElementById('f-historic').textContent=t.fHistoric;
  document.getElementById('f-jenever').textContent=t.fJenever;
  document.getElementById('f-terrace').textContent=t.fTerrace;
  document.getElementById('f-night').textContent=t.fNight;
  document.getElementById('f-ajax').textContent=t.fAjax;
  document.getElementById('f-music').textContent=t.fMusic;
  document.getElementById('f-locals').textContent=t.fLocals;
  document.getElementById('f-loved').textContent=t.fLoved;
  buildHoodSelect();
}

const map=L.map('map',{center:[52.370,4.898],zoom:13});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
const markers={};const pinEls={};
K.forEach(k=>{
  const d=document.createElement('div');
  d.className='kpin';
  d.style.cssText='background:'+(k.award?'#6B1D5F':k.nightCafe?'#1A0A4E':k.ajaxCafe?'#6B0000':k.sunny?'#B86A08':'#4A2A08');
  d.textContent=k.award?'🏆':k.nightCafe?'🌙':k.ajaxCafe?'⚽':k.sunny?'☀':'🍺';
  const icon=L.divIcon({html:d.outerHTML,className:'',iconSize:[26,26],iconAnchor:[13,13]});
  const m=L.marker([k.lat,k.lng],{icon}).addTo(map);
  m.on('click',()=>selK(k.id));
  markers[k.id]=m;
});
map.whenReady(()=>setTimeout(()=>{
  K.forEach(k=>{const m=markers[k.id];if(m){const el=m.getElement();if(el)pinEls[k.id]=el.querySelector('.kpin');}});
},300));

let aF=new Set(),srch='',selId=null,loved=new Set(),searchTimer=null;
const listNodes={};

function tl(t){
  return({nl:{jenever:'Jenever',terrace:'Terras',historic:'Historisch',night:'Nachtcafé',ajax:'Ajax',music:'Muziek','no-tourists':'Geen toeristen'},
           en:{jenever:'Jenever',terrace:'Terrace',historic:'Historic',night:'Night café',ajax:'Ajax',music:'Music','no-tourists':'Locals only'}}[lang]||{})[t]||t;
}

function vis(k){
  if(aF.has('loved')&&!loved.has(k.id))return false;
  if(aF.size>0&&![...aF].every(f=>{
    if(f==='loved')return loved.has(k.id);
    if(f==='night')return k.nightCafe;
    if(f==='ajax')return k.ajaxCafe;
    if(f==='music')return k.musicCafe;
    return k.tags.includes(f);
  }))return false;
  if(srch&&!k.name.toLowerCase().includes(srch)&&!k.hood.toLowerCase().includes(srch)&&!k.addr.toLowerCase().includes(srch))return false;
  return true;
}

function upd(){
  K.forEach(k=>{
    const el=pinEls[k.id]||markers[k.id]?.getElement()?.querySelector('.kpin');
    if(el){el.style.opacity=vis(k)?'1':'0.18';if(!pinEls[k.id])pinEls[k.id]=el;}
  });
}

function renderTags(k){
  const base=k.tags.filter(t=>t!=='no-tourists');
  return base.map(t=>`<span class="tag ${t}">${tl(t)}</span>`).join('')+
    (k.nightCafe?`<span class="tag night">🌙 ${tl('night')}</span>`:'')+
    (k.ajaxCafe?`<span class="tag ajax">⚽ Ajax</span>`:'')+
    (k.musicCafe?`<span class="tag music">🎵 ${tl('music')}</span>`:'')+
    (k.award?`<span class="tag award">🏆 ${T[lang].award}</span>`:'')+
    (k.tags.includes('no-tourists')?`<span class="tag no-tourists">${tl('no-tourists')}</span>`:'')+
    (loved.has(k.id)?`<span class="tag loved">${T[lang].lovedTag}</span>`:'');
}

function renderList(){
  const visible=K.filter(vis);
  document.getElementById('cnt').textContent=visible.length+' kroegen';
  const listEl=document.getElementById('list');
  if(!visible.length){
    Object.keys(listNodes).forEach(id=>{if(listNodes[id].parentNode)listNodes[id].parentNode.removeChild(listNodes[id]);delete listNodes[id];});
    if(!listEl.querySelector('.no-res'))listEl.innerHTML=`<div class="no-res">${T[lang].noRes}</div>`;
    upd();return;
  }
  const nr=listEl.querySelector('.no-res');if(nr)nr.remove();
  const visIds=new Set(visible.map(k=>k.id));
  Object.keys(listNodes).forEach(id=>{if(!visIds.has(parseInt(id))){if(listNodes[id].parentNode)listNodes[id].parentNode.removeChild(listNodes[id]);delete listNodes[id];}});
  let refNode=null;
  for(let i=visible.length-1;i>=0;i--){
    const k=visible[i];const isSel=selId===k.id;const isLoved=loved.has(k.id);
    if(listNodes[k.id]){
      const node=listNodes[k.id];
      node.classList.toggle('sel',isSel);
      const heart=node.querySelector('.ki-heart');
      if(heart){heart.classList.toggle('loved',isLoved);heart.textContent=isLoved?'♥':'♡';}
      // update loved tag in ki-tags
      const tagsEl=node.querySelector('.ki-tags');
      if(tagsEl)tagsEl.innerHTML=renderTags(k);
      if(node.nextSibling!==refNode)listEl.insertBefore(node,refNode);
    }else{
      const node=document.createElement('div');
      node.className='ki'+(isSel?' sel':'');node.dataset.id=k.id;
      node.innerHTML=`<div class="ki-top"><span class="ki-name">${k.name}</span><span class="ki-right"><span class="ki-est">est. ${k.year}</span><span class="ki-heart${isLoved?' loved':''}">${isLoved?'♥':'♡'}</span></span></div><div class="ki-hood">${k.hood} · ${k.addr}</div><div class="ki-vibe">${k.vibe[lang]}</div><div class="ki-tags">${renderTags(k)}</div>`;
      node.addEventListener('click',()=>selK(k.id));
      node.querySelector('.ki-heart').addEventListener('click',e=>{e.stopPropagation();toggleLove(k.id);});
      listNodes[k.id]=node;listEl.insertBefore(node,refNode);
    }
    refNode=listNodes[k.id];
  }
  upd();
}

function showDet(k){
  const t=T[lang];
  document.getElementById('det-name').textContent=k.name;
  document.getElementById('det-meta').textContent=`${k.hood} · ${k.addr} · est. ${k.year}`;
  document.getElementById('det-tags').innerHTML=renderTags(k);
  // Build feedback section with data-id attribute to avoid apostrophe issues
  document.getElementById('det-body').innerHTML=`
    <div class="db wide"><div class="dlbl">Over deze kroeg</div><div class="dval">${k.vibe[lang]}</div></div>
    <div class="db wide"><div class="dlbl">Sfeer / meer feitjes</div><div class="dval">${k.tip[lang]}</div></div>
    <div class="db wide"><div class="dlbl">${t.hours}</div><div class="dval">${k.hours}</div></div>
    <div class="db"><div class="dlbl">${t.hood}</div><div class="dval">${k.hood}</div></div>
    <div class="db"><div class="dlbl">${t.sun}</div><div class="dval">${k.sunny?'☀ '+k.sunHours:k.tags.includes('terrace')?t.noSun:t.noTerrace}</div></div>
    <div class="db wide" id="fb-wrap-${k.id}">
      <button class="fb-btn" data-cafe-id="${k.id}">${t.feedbackBtn}</button>
      <div class="fb-form">
        <input type="text" placeholder="${t.feedbackName}" id="fb-name-${k.id}">
        <textarea placeholder="${t.feedbackMsg}" id="fb-msg-${k.id}"></textarea>
        <button class="fb-send" data-cafe-id="${k.id}">${t.feedbackSend}</button>
        <div class="fb-ok" id="fb-ok-${k.id}">${t.feedbackOk}</div>
      </div>
    </div>`;
  // Attach events via data attributes — no inline onclick, no apostrophe issues
  document.querySelector(`#fb-wrap-${k.id} .fb-btn`).addEventListener('click',function(){
    const form=this.nextElementSibling;
    form.classList.toggle('open');
    this.style.display=form.classList.contains('open')?'none':'block';
  });
  document.querySelector(`#fb-wrap-${k.id} .fb-send`).addEventListener('click',()=>sendFeedback(k.id,k.name));
  document.getElementById('det').classList.add('open');
}

async function sendFeedback(id,name){
  const nameVal=document.getElementById('fb-name-'+id).value.trim();
  const msgVal=document.getElementById('fb-msg-'+id).value.trim();
  if(!msgVal)return;
  const okEl=document.getElementById('fb-ok-'+id);
  try{
    await fetch(`https://formspree.io/f/${FORMSPREE_ID}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({name:nameVal,message:msgVal,cafe:name})
    });
    okEl.style.display='block';
    document.getElementById('fb-name-'+id).value='';
    document.getElementById('fb-msg-'+id).value='';
  }catch(e){okEl.textContent='Er ging iets mis. Probeer het opnieuw.';okEl.style.display='block';}
}

function toggleLove(id){
  loved.has(id)?loved.delete(id):loved.add(id);
  const node=listNodes[id];
  if(node){
    const heart=node.querySelector('.ki-heart');
    if(heart){heart.classList.toggle('loved',loved.has(id));heart.textContent=loved.has(id)?'♥':'♡';}
    const tagsEl=node.querySelector('.ki-tags');
    const k=K.find(x=>x.id===id);
    if(tagsEl&&k)tagsEl.innerHTML=renderTags(k);
  }
  // refresh detail panel tags if open
  if(selId===id){
    const k=K.find(x=>x.id===id);
    if(k)document.getElementById('det-tags').innerHTML=renderTags(k);
  }
  // if loved filter is active, re-render list
  if(aF.has('loved'))renderList();
}

function scrollToKroeg(id){const node=listNodes[id];if(node)node.scrollIntoView({block:'nearest',behavior:'smooth'});}

function selK(id){
  const prev=selId;selId=selId===id?null:id;
  if(prev&&listNodes[prev])listNodes[prev].classList.remove('sel');
  if(selId&&listNodes[selId])listNodes[selId].classList.add('sel');
  Object.entries(markers).forEach(([mid,m])=>{
    const el=pinEls[parseInt(mid)]||m.getElement()?.querySelector('.kpin');
    if(el)el.classList.toggle('sel',parseInt(mid)===selId);
  });
  if(!selId){closeDet();return;}
  const k=K.find(x=>x.id===id);
  showDet(k);
  // Pan so pin appears in the visible centre above the detail panel
  requestAnimationFrame(()=>{
    const detH=document.getElementById('det').offsetHeight;
    const pt=map.project([k.lat,k.lng],map.getZoom());
    pt.y+=detH/2;
    map.panTo(map.unproject(pt,map.getZoom()),{animate:true,duration:0.4});
  });
  setTimeout(()=>scrollToKroeg(id),50);
}

function closeDet(){
  selId=null;document.getElementById('det').classList.remove('open');
  Object.values(listNodes).forEach(n=>n.classList.remove('sel'));
  Object.values(pinEls).forEach(p=>{if(p)p.classList.remove('sel');});
}

function doSearch(v){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{srch=v.toLowerCase().trim();selId=null;closeDet();renderList();},120);
}

document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.f;
    if(aF.has(f)){aF.delete(f);btn.classList.remove('active');}
    else{aF.add(f);btn.classList.add('active');}
    selId=null;closeDet();renderList();
  });
});

// ── CRAWL ──
const hoods=['Jordaan','Centrum','De Pijp','West','Oost','Zuid','Noord'];

function buildHoodSelect(){
  const sel=document.getElementById('c-hood');const cur=sel.value;
  sel.innerHTML=`<option value="">${T[lang].crawlAll}</option>`+hoods.map(h=>`<option value="${h}"${cur===h?' selected':''}>${h}</option>`).join('');
  buildCrawl(sel.value);
}

function buildCrawl(hood){
  const t=T[lang];
  const lovedList=[...loved];
  // Show favourites crawl button if any loved
  const favBtn=lovedList.length>0
    ?`<button class="hdr-btn" style="width:100%;margin-bottom:10px;font-size:12px" onclick="buildFavCrawl()">${t.crawlFavBtn}</button>`
    :'';
  // Regular crawl
  let pool=K.filter(k=>!hood||k.hood===hood);
  pool=[...pool].sort(()=>Math.random()-0.5).slice(0,4);
  const times=t.times;
  document.getElementById('cstops').innerHTML=favBtn+pool.map((k,i)=>`
    <div class="cstop">
      <div class="cnum">${i+1}</div>
      <div class="cinfo">
        <div class="cname">${k.name}</div>
        <div class="cdesc">${k.addr} · est. ${k.year} · ${times[i]}</div>
        <div class="cdesc" style="color:var(--text3);margin-top:1px;font-size:10px">${k.hours.split('·')[0].trim()}</div>
      </div>
    </div>${i<pool.length-1?'<hr class="chr">':''}`).join('');
}

function buildFavCrawl(){
  const t=T[lang];
  const lovedList=[...loved];
  if(!lovedList.length){
    document.getElementById('cstops').innerHTML=`<p style="font-size:12px;color:var(--text3);font-family:sans-serif">${t.crawlNoFav}</p>`;
    return;
  }
  document.getElementById('crawl-title').textContent=t.crawlFavTitle;
  document.getElementById('crawl-desc').textContent=t.crawlFavDesc;
  const pool=lovedList.map(id=>K.find(k=>k.id===id)).filter(Boolean).sort(()=>Math.random()-0.5).slice(0,4);
  const times=t.times;
  document.getElementById('cstops').innerHTML=pool.map((k,i)=>`
    <div class="cstop">
      <div class="cnum loved-num">♥</div>
      <div class="cinfo">
        <div class="cname">${k.name}</div>
        <div class="cdesc">${k.addr} · est. ${k.year} · ${times[i]}</div>
        <div class="cdesc" style="color:var(--text3);margin-top:1px;font-size:10px">${k.hours.split('·')[0].trim()}</div>
      </div>
    </div>${i<pool.length-1?'<hr class="chr">':''}`).join('');
}

function openCrawl(){
  document.getElementById('crawl-title').textContent=T[lang].crawlTitle;
  document.getElementById('crawl-desc').textContent=T[lang].crawlDesc;
  document.getElementById('crawl-modal').classList.add('open');
  buildHoodSelect();
}
function closeCrawl(){document.getElementById('crawl-modal').classList.remove('open');}
document.getElementById('c-hood').addEventListener('change',function(){buildCrawl(this.value);});
document.getElementById('crawl-modal').addEventListener('click',function(e){if(e.target===this)closeCrawl();});

applyLang();renderList();
</script>
